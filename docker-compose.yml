services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  vector_db:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:root@db:5432/postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      QDRANT_URL: http://vector_db:6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vector_db:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ./backend
    command: celery -A backend.worker.app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:root@db:5432/postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      QDRANT_URL: http://vector_db:6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  uploads_data: